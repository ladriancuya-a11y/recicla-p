name: recicla_p
description: "RECICLA-P - App de gestión y educación sobre reciclaje de residuos"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  http: 1.5.0
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3
  intl: ^0.20.1
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  lottie: ^3.3.1
  cached_network_image: ^3.4.1
  flutter_staggered_animations: ^1.1.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
